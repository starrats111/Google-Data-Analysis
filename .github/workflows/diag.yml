name: Remote Diag (temp)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Trace BSH link through proxy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set +e
            cd /home/ubuntu/Google-Data-Analysis/crm-mvp || exit 1
            DBURL=$(grep -E '^DATABASE_URL=' .env | cut -d= -f2- | tr -d '"')
            DBUSER=$(echo "$DBURL" | sed -E 's|mysql://([^:]+):.*|\1|')
            DBPASS=$(echo "$DBURL" | sed -E 's|mysql://[^:]+:([^@]+)@.*|\1|')
            DBHOST=$(echo "$DBURL" | sed -E 's|.*@([^:/]+).*|\1|')
            DBNAME=$(echo "$DBURL" | sed -E 's|.*/([^/?]+)(\?.*)?$|\1|')
            Q(){ mysql -h"$DBHOST" -u"$DBUSER" -p"$DBPASS" "$DBNAME" -N -e "$1" 2>/dev/null; }

            export ENC_SECRET=$(grep -E '^ENCRYPTION_SECRET=' .env | cut -d= -f2- | tr -d '"')
            export BD_LINK=$(Q "SELECT tracking_link FROM user_merchants WHERE platform='BSH' AND merchant_id='8001831' AND is_deleted=0 AND tracking_link<>'' LIMIT 1")
            WK=$(Q "SELECT CONCAT(m.merchant_id,'|||',m.tracking_link) FROM user_merchants m JOIN affiliate_click_daily cd ON cd.platform=m.platform AND cd.merchant_id=m.merchant_id AND cd.user_id=m.user_id WHERE m.platform='BSH' AND m.merchant_id<>'8001831' AND m.is_deleted=0 AND m.tracking_link<>'' AND cd.click_date>=CURDATE()-INTERVAL 1 DAY AND cd.clicks>0 GROUP BY m.id ORDER BY SUM(cd.clicks) DESC LIMIT 1")
            export WK_MID="${WK%%|||*}"
            export WK_LINK="${WK#*|||}"
            PROW=$(Q "SELECT CONCAT_WS('|||',name,host,port,proxy_type,COALESCE(username_template,''),COALESCE(password,'')) FROM kyads_proxies WHERE status='active' AND is_deleted=0 ORDER BY priority ASC LIMIT 1")
            export P_NAME=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $1}')
            export P_HOST=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $2}')
            export P_PORT=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $3}')
            export P_TYPE=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $4}')
            export P_TPL=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $5}')
            export P_PASS=$(echo "$PROW" | awk -F'\\|\\|\\|' '{print $6}')

            cat > ./_trace_bsh.mjs <<'EOF'
            import crypto from 'node:crypto'
            import https from 'node:https'
            import http from 'node:http'

            const SECRET = process.env.ENC_SECRET || 'crm-default-secret-key-change-in-production'
            function decryptPassword(v){
              if(!v) return ''
              const parts=v.split(':'); if(parts.length!==3) return v
              try{
                const salt=Buffer.from(parts[0],'hex'), iv=Buffer.from(parts[1],'hex'), enc=Buffer.from(parts[2],'hex')
                if(salt.length!==16||iv.length!==16) return v
                const key=crypto.scryptSync(SECRET,salt,32)
                const d=crypto.createDecipheriv('aes-256-cbc',key,iv)
                return Buffer.concat([d.update(enc),d.final()]).toString('utf8')
              }catch{ return v }
            }
            function procTemplate(t,country){
              if(!t) return ''
              const up=country.toUpperCase(); const code = up==='GB'?'UK':up
              return t.replace(/\{COUNTRY\}/g,code).replace(/\{country\}/g,code.toLowerCase())
                .replace(/\{COUNTRY_ISO\}/g,up).replace(/\{country_iso\}/g,country.toLowerCase())
                .replace(/\{random:(\d+)\}/gi,(_,n)=>{let s='';for(let i=0;i<+n;i++)s+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];return s})
                .replace(/\{session:(\d+)\}/gi,(_,n)=>{let s='';for(let i=0;i<+n;i++)s+=Math.floor(Math.random()*10);return s})
                .replace(/\*\*/g,code)
            }

            const user = procTemplate(process.env.P_TPL||'', 'US')
            const pass = decryptPassword(process.env.P_PASS||'')
            const scheme = (process.env.P_TYPE||'socks5').toLowerCase().includes('http') ? 'http' : 'socks5'
            const proxyUrl = `${scheme}://${encodeURIComponent(user)}:${encodeURIComponent(pass)}@${process.env.P_HOST}:${process.env.P_PORT}`
            console.log(`PROXY provider=${process.env.P_NAME} type=${process.env.P_TYPE} scheme=${scheme} host=${process.env.P_HOST}:${process.env.P_PORT} user=${user.slice(0,28)}`)

            async function makeAgent(){
              if(scheme==='socks5'){ const {SocksProxyAgent}=await import('socks-proxy-agent'); return new SocksProxyAgent(proxyUrl,{rejectUnauthorized:false}) }
              const {HttpsProxyAgent}=await import('https-proxy-agent'); return new HttpsProxyAgent(proxyUrl,{rejectUnauthorized:false})
            }
            const agent = await makeAgent()

            function once(target){
              return new Promise((resolve)=>{
                let parsed; try{parsed=new URL(target)}catch{return resolve({err:'invalid_url'})}
                const isH=parsed.protocol==='https:'; const mod=isH?https:http
                const req=mod.request({hostname:parsed.hostname,port:parsed.port?+parsed.port:(isH?443:80),path:(parsed.pathname||'/')+parsed.search,method:'GET',
                  headers:{'User-Agent':'Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1','Accept':'text/html,application/xhtml+xml,*/*;q=0.9','Accept-Encoding':'identity'},
                  agent,timeout:25000,rejectUnauthorized:false},(res)=>{
                    const status=res.statusCode||0, loc=res.headers['location']; res.resume()
                    resolve({status,loc})
                  })
                req.on('error',(e)=>resolve({err:String(e).slice(0,140)}))
                req.on('timeout',()=>{req.destroy();resolve({err:'timeout'})})
                req.end()
              })
            }

            async function trace(label, startUrl){
              console.log(`\n===== TRACE ${label} =====`)
              console.log('START ' + startUrl.slice(0,150))
              let target=startUrl
              for(let hop=0; hop<=10; hop++){
                const r=await once(target)
                let host=''; try{host=new URL(target).hostname}catch{}
                if(r.err){ console.log(`  hop${hop} ERR ${r.err} @${host}`); break }
                console.log(`  hop${hop} HTTP ${r.status} @${host} loc=${r.loc?String(r.loc).slice(0,110):'-'}`)
                if([301,302,303,307,308].includes(r.status)&&r.loc){ try{target=new URL(r.loc,target).toString()}catch{break}; continue }
                if(r.status>=400){
                  let jumped=false
                  try{ const o=new URL(target); for(const k of ['url','dest','redirect','landing','goto','target','redir','new','u']){ const v=o.searchParams.get(k); if(v){ let dv=v; try{dv=decodeURIComponent(v)}catch{} if(/^https?:\/\//i.test(dv)){ console.log(`  -> ${r.status} embed-fallback ${k}=${dv.slice(0,90)}`); target=dv; jumped=true; break } } } }catch{}
                  if(jumped){ let sh=''; try{sh=new URL(startUrl).hostname}catch{}; if(host!==sh||true) continue }
                }
                console.log(`  FINAL status=${r.status} url=${target.slice(0,150)}`)
                break
              }
            }

            if(process.env.BD_LINK) await trace('BSH BellaDahl 8001831 (FAILING)', process.env.BD_LINK)
            else console.log('no BD_LINK')
            if(process.env.WK_LINK && process.env.WK_LINK!==process.env.WK_MID){ console.log('\nworking BSH merchant = '+process.env.WK_MID); await trace('BSH working '+process.env.WK_MID, process.env.WK_LINK) }
            else console.log('\nno working BSH merchant with recent clicks')
            EOF
            node ./_trace_bsh.mjs 2>&1 | head -80
            rm -f ./_trace_bsh.mjs
