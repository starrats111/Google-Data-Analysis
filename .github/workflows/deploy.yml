name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'crm-mvp/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # D-091：2 核/3.7G 低配生产机在「旧进程在线 + next build」并存时内存吃紧、构建偶发 >12m，
    # 触发 appleboy command_timeout(原 12m) 超时（构建仍在跑、非 OOM 早退）。放宽到 24m 留足余量。
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 24m
          script: |
            set -e

            APP_DIR="$HOME/Google-Data-Analysis"
            CRM_DIR="$APP_DIR/crm-mvp"

            echo "===== 1. Pull latest code ====="
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "===== 2. Check server resources ====="
            AVAIL_MEM=$(free -m | awk '/^Mem:/{print $7}')
            echo "Available memory: ${AVAIL_MEM}MB"
            if [ "$AVAIL_MEM" -lt 300 ]; then
              echo "Low memory, clearing cache..."
              sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            fi

            echo "===== 3. Install dependencies ====="
            cd "$CRM_DIR"
            export TZ="Asia/Shanghai"
            # C-113: 768MB 在 webpack client 编译阶段 OOM 被 kill（.next 只生成 server/ 无 static/ 与 BUILD_ID），
            #        提到 1536MB（历史验证可成功）。build 前回收 buff/cache 腾内存。
            export NODE_OPTIONS="--max-old-space-size=1536"

            if git diff HEAD~1 --name-only | grep -qE "crm-mvp/package(-lock)?\.json"; then
              echo "package files changed, running npm install..."
              npm install --omit=dev --ignore-scripts 2>&1 | tail -10
            else
              echo "No dependency changes, skipping npm install"
            fi

            echo "===== 4. Generate Prisma Client ====="
            npx prisma generate 2>&1 | tail -5

            echo "===== 5a. (D-057) 回收内存，构建前不删除 .next（避免线上 404 窗口）====="
            # D-057 真因修复：原先此处 `rm -rf .next` 在 build 之前执行，但旧 PM2 进程（next start）
            # 仍在用同一 .next 对外服务——next start 按请求从磁盘读 .next/static/，.next 被删后整个
            # 构建期间（数分钟）线上所有 chunk 请求 404 → 浏览器 ChunkLoadError + Cloudflare 负缓存 404。
            # `rm -rf .next` 原是 C-111 turbopack chunk 混淆的临时对策，现已用 --webpack 基本消除，不再需要。
            # build 前仅回收可释放缓存，给 webpack client 编译腾出内存峰值空间。
            sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || sudo sh -c 'sync && echo 3 > /proc/sys/vm/drop_caches' 2>/dev/null || true

            echo "===== 5b. Build with WEBPACK (NOT turbopack) ====="
            # turbopack 默认生产构建有 client chunk 引用未输出 bug → ChunkLoadError，故强制 --webpack。
            #
            # D-078 真因修复：原「常规部署 in-place 增量构建」其实并非零中断——
            # `next build` 会就地删除/重写 .next/server/app/**/page_client-reference-manifest.js 等产物，
            # 旧 PM2 进程（next start）在构建的数分钟里读到被删/未重建的文件 → 该路由 500 / chunk 404，
            # 而 Cloudflare 会把这些 404 负缓存住（默认边缘 TTL），导致构建结束后用户仍 ChunkLoadError。
            # 因此一律改为「构建到 .next.tmp → 验证 → 原子 mv 切换」，旧 .next 全程不被触碰，
            # 旧进程持续正常服务，切换窗口压到亚秒级，根除构建期 404 被 CF 负缓存的问题。
            echo "干净重建到 .next.tmp 后原子切换（旧 .next 全程在线）"
            rm -rf .next.tmp 2>/dev/null || true
            NODE_OPTIONS="--max-old-space-size=1536" NEXT_DIST_DIR=".next.tmp" npx next build --webpack 2>&1 | tail -20
            if [ ! -f "$CRM_DIR/.next.tmp/BUILD_ID" ]; then
              echo "BUILD FAILED: .next.tmp/BUILD_ID not found, aborting deploy"
              exit 1
            fi
            rm -rf .next.old 2>/dev/null || true
            mv .next .next.old 2>/dev/null || true
            mv .next.tmp .next

            echo "===== 6. Verify build ====="
            if [ ! -f "$CRM_DIR/.next/BUILD_ID" ]; then
              echo "BUILD FAILED: .next/BUILD_ID not found, aborting deploy"
              exit 1
            fi
            echo "Build verified: BUILD_ID=$(cat $CRM_DIR/.next/BUILD_ID)"

            echo "===== 7. Database migrations ====="
            npx prisma migrate deploy 2>&1 | tail -5

            echo "===== 8. Reload service (zero-downtime) ====="
            cd "$CRM_DIR"
            if command -v pm2 &> /dev/null; then
              if pm2 describe ad-automation > /dev/null 2>&1; then
                pm2 reload ecosystem.config.cjs --update-env
              else
                pm2 start ecosystem.config.cjs
              fi
              sleep 5
              pm2 status ad-automation
            else
              nohup npm start > logs/app.log 2>&1 &
              echo "Started with PID: $!"
              sleep 5
            fi

            echo "===== 9. Health check ====="
            RETRIES=0
            MAX_RETRIES=6
            HTTP_CODE="000"
            while [ "$RETRIES" -lt "$MAX_RETRIES" ]; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:20050/api/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                break
              fi
              RETRIES=$((RETRIES + 1))
              echo "Health check attempt $RETRIES/$MAX_RETRIES: HTTP $HTTP_CODE, retrying in 5s..."
              sleep 5
            done

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check PASSED (HTTP $HTTP_CODE)"
              # D-057: 原地增量构建会累积旧 chunk，清理 7 天前的孤儿 chunk（保留一周宽限期给在途旧标签页），防磁盘膨胀。
              find "$CRM_DIR/.next/static/chunks" -type f -mtime +7 -delete 2>/dev/null || true
              rm -rf "$CRM_DIR/.next.old" 2>/dev/null || true
            else
              echo "Health check FAILED after $MAX_RETRIES attempts (HTTP $HTTP_CODE)"
              pm2 logs ad-automation --err --lines 20 --nostream 2>/dev/null || true
              exit 1
            fi

            echo "===== Deploy complete ====="
            free -m | head -2
