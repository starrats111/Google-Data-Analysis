name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'crm-mvp/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 12m
          script: |
            set -e

            APP_DIR="$HOME/Google-Data-Analysis"
            CRM_DIR="$APP_DIR/crm-mvp"

            echo "===== 1. Pull latest code ====="
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "===== 2. Check server resources ====="
            AVAIL_MEM=$(free -m | awk '/^Mem:/{print $7}')
            echo "Available memory: ${AVAIL_MEM}MB"
            if [ "$AVAIL_MEM" -lt 300 ]; then
              echo "Low memory, clearing cache..."
              sync && echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            fi

            echo "===== 3. Install dependencies ====="
            cd "$CRM_DIR"
            export NODE_OPTIONS="--max-old-space-size=768"

            if git diff HEAD~1 --name-only | grep -q "crm-mvp/package-lock.json"; then
              echo "package-lock.json changed, running npm ci..."
              npm ci --production --ignore-scripts 2>/dev/null || npm install --production
            else
              echo "No dependency changes, skipping npm install"
            fi

            echo "===== 4. Stop service before build (B-1) ====="
            if command -v pm2 &> /dev/null; then
              pm2 stop ad-automation 2>/dev/null || true
              echo "Service stopped for safe build"
            fi

            echo "===== 5. Build ====="
            NODE_OPTIONS="--max-old-space-size=512" npx next build 2>&1 | tail -20

            echo "===== 6. Verify build (B-2) ====="
            if [ ! -f "$CRM_DIR/.next/BUILD_ID" ]; then
              echo "BUILD FAILED: .next/BUILD_ID not found, aborting deploy"
              pm2 start ad-automation 2>/dev/null || true
              exit 1
            fi
            echo "Build verified: BUILD_ID=$(cat $CRM_DIR/.next/BUILD_ID)"

            echo "===== 7. Database migrations ====="
            npx prisma migrate deploy 2>&1 | tail -5

            echo "===== 8. Start service ====="
            cd "$CRM_DIR"
            if command -v pm2 &> /dev/null; then
              # 始终用 ecosystem 对齐内存/kill_timeout 等（仅 pm2 start 名称不会读入文件变更）
              if pm2 describe ad-automation > /dev/null 2>&1; then
                pm2 reload ecosystem.config.cjs --update-env
              else
                pm2 start ecosystem.config.cjs
              fi
              sleep 5
              pm2 status ad-automation
            else
              nohup npm start > logs/app.log 2>&1 &
              echo "Started with PID: $!"
              sleep 5
            fi

            echo "===== 9. Health check ====="
            RETRIES=0
            MAX_RETRIES=6
            HTTP_CODE="000"
            while [ "$RETRIES" -lt "$MAX_RETRIES" ]; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:20050/api/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                break
              fi
              RETRIES=$((RETRIES + 1))
              echo "Health check attempt $RETRIES/$MAX_RETRIES: HTTP $HTTP_CODE, retrying in 5s..."
              sleep 5
            done

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check PASSED (HTTP $HTTP_CODE)"
            else
              echo "Health check FAILED after $MAX_RETRIES attempts (HTTP $HTTP_CODE)"
              pm2 logs ad-automation --err --lines 20 --nostream 2>/dev/null || true
              exit 1
            fi

            echo "===== Deploy complete ====="
            free -m | head -2
